spring:
  application:
    name: search-engine
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/search_engine?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: dd.159178280


  # MyBatis-Plus配置
  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# 服务器配置
server:
  port: 80

# Gitee API配置
gitee:
  # Gitee API基础地址
  api-base-url: https://gitee.com/api/v5
  # Gitee访问令牌（可选，用于提高API调用限制）
  # 如果不需要，可以留空或删除此行
  access-token: 0a8d6cd35a802f360f10112151a7fa62
  # 每页获取的数据量（默认100，最大100）
  per-page: 100
  # 请求超时时间（毫秒）
  timeout: 10000

# 搜索引擎配置
searchengine:
  index:
    path: ./data/index

# 日志配置
logging:
  level:
    root: INFO
    com.searchengine: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
